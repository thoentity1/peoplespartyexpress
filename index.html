<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>People's Party Express</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b132b;
      color: white;
    }

    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #081024;
      padding: 20px;
    }

    .sidebar h2 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #ff4d6d;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 12px 0;
      transition: 0.2s;
    }

    .sidebar a:hover {
      color: #ff4d6d;
      padding-left: 5px;
    }

    /* Main */
    .main {
      flex: 1;
    }

    /* Hero */
    .hero {
      height: 90vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(90deg, #ff007a, #7b2ff7);
      padding: 20px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 18px;
      max-width: 600px;
      margin-bottom: 25px;
    }

    .btn {
      background: white;
      color: #ff007a;
      padding: 12px 24px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>🍾 Menu</h2>
      <a href="#">Home</a>
      <a href="#">Packages</a>
      <a href="platter.html">Platters</a>
      <a href="#">Gallery</a>
      <a href="#">Reviews</a>
      <a href="#">Contact</a>
    </aside>

    <!-- Main Content -->
    <main class="main">

      <section class="hero">
        <h1>🎉 People’s Party Express</h1>
        <p>
          Everything you need for the perfect party — drinks, braai packs,
          bubbly hire and more.
        </p>
        <a href="#" class="btn">Browse Party Packs</a>
      </section>

    </main>

  </div>

</body>
</html>
